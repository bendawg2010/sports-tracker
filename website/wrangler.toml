# Cloudflare Pages configuration for Sports Tracker promo site.
#
# Deploy from this directory with:
#   wrangler pages deploy
#
# First-time setup will prompt you to attach this to a Cloudflare Pages
# project; subsequent runs reuse the saved binding in .wrangler/.
